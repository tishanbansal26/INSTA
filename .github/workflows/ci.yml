name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: insureflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v3
      with:
        node-version: 22.x
        cache: 'npm'
        
    - name: Install dependencies (Server)
      run: npm ci
      working-directory: ./server
      
    - name: Generate Prisma Client
      run: npx prisma generate
      working-directory: ./server

    - name: Run Tests
      run: npm run test
      working-directory: ./server
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://root:password@localhost:5432/insureflow_test?schema=public
        JWT_SECRET: test_secret
        REDIS_URL: redis://localhost:6379

    - name: Build Server
      run: npm run build
      working-directory: ./server

    - name: Install dependencies (Client)
      run: npm ci
      working-directory: ./client

    - name: Build Client
      run: npm run build
      working-directory: ./client
