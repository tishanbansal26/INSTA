version: '3.8'

services:
  frontend:
    build: 
      context: ./client
    container_name: insureflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
    container_name: insureflow_backend
    environment:
      - DATABASE_URL=postgresql://insureflow_user:insureflow_password@postgres:5432/insureflow_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-jwt-key-change-in-production
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: insureflow_postgres
    environment:
      POSTGRES_USER: insureflow_user
      POSTGRES_PASSWORD: insureflow_password
      POSTGRES_DB: insureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insureflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
