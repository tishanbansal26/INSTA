version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: insureflow-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: insureflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insureflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: insureflow-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://root:password@postgres:5432/insureflow?schema=public
      - JWT_SECRET=super_secret_production_key_12345
      - JWT_EXPIRES_IN=1h
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: insureflow-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: insureflow-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
