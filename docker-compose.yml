version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: insureflow-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insureflow

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:

  postgres-data:
